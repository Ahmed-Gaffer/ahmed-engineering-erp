name: Trigger Hugging Face Space Rebuild

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Space rebuild on Hugging Face
        run: |
          curl -X POST "https://huggingface.co/api/spaces/${{ secrets.HF_SPACE_REPO }}/rebuild" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -H "Content-Type: application/json"