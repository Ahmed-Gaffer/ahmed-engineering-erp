name: Deploy Develop to HF Space

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set GHCR image name (lowercase owner)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "GHCR_IMAGE=ghcr.io/${OWNER}/engineering-erp" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push Docker image
        run: |
          docker build -t ${{ env.GHCR_IMAGE }}:latest \
                      -t ${{ env.GHCR_IMAGE }}:${{ github.sha }} \
                      .
          docker push ${{ env.GHCR_IMAGE }}:latest
          docker push ${{ env.GHCR_IMAGE }}:${{ github.sha }}

      - name: Push thin Dockerfile + README to HF Space (main branch = develop)
        run: |
          cd /tmp
          rm -rf space-clean && mkdir space-clean && cd space-clean
          cat > Dockerfile << 'ENDOFDOCKER'
          FROM ${{ env.GHCR_IMAGE }}:${{ github.sha }}
          ENDOFDOCKER
          cat > README.md << 'ENDOFREADME'
          ---
          title: Engineering ERP
          emoji: 🚀
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 8000
          pinned: false
          ---
          ENDOFREADME
          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Deploy ${{ github.sha }} [skip ci]"
          git remote add hf "https://huggingface.co/spaces/${{ secrets.HF_SPACE_REPO }}"
          echo "https://token:${{ secrets.HF_TOKEN }}@huggingface.co" > ~/.git-credentials
          git config credential.helper store
          git push --force hf HEAD:main
