name: Deploy to Hugging Face Space

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Hugging Face Hub
        uses: huggingface/hub-login@v1
        with:
          token: ${{ secrets.HF_TOKEN }}

      - name: Build and push Docker image to HF Space (no cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.HF_SPACE_REPO }}:latest
          platforms: linux/amd64
          no-cache: true

      - name: Trigger Space rebuild
        run: |
          curl -X POST "https://huggingface.co/api/spaces/${{ secrets.HF_SPACE_REPO }}/rebuild" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -H "Content-Type: application/json"