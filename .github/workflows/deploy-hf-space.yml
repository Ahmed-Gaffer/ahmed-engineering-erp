name: Deploy to Hugging Face Space

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push code to Hugging Face Space
        run: |
          SPACE="${{ secrets.HF_SPACE_REPO || 'Tablets/engineering-erp' }}"
          rm -rf frontend/node_modules frontend/dist .venv __pycache__ .pytest_cache
          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Deploy $(date -u)"
          git remote add hf "https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/$SPACE"
          git push --force hf HEAD:main 2>&1

      - name: Check build status
        run: |
          SPACE="${{ secrets.HF_SPACE_REPO || 'Tablets/engineering-erp' }}"
          echo "Deployed to: https://huggingface.co/spaces/$SPACE"
          echo "App URL: https://$(echo $SPACE | tr '/' '-').hf.space"
