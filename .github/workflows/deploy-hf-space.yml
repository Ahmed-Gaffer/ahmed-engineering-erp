name: Deploy to Hugging Face Space

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Hugging Face Hub
        uses: docker/login-action@v3
        with:
          registry: huggingface.co
          username: token
          password: ${{ secrets.HF_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: huggingface.co/${{ secrets.HF_SPACE_REPO || 'Tablets/engineering-management-system' }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Space rebuild
        run: |
          curl -s -X POST \
            "https://huggingface.co/api/spaces/${{ secrets.HF_SPACE_REPO || 'Tablets/engineering-management-system' }}/rebuild" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -H "Content-Type: application/json"
