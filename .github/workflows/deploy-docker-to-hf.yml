name: Build & Deploy Docker Image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  # GitHub Container Registry
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/engineering-erp

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ env.GHCR_IMAGE }}:latest \
                      -t ${{ env.GHCR_IMAGE }}:${{ github.sha }} \
                      .

      - name: Push Docker image to GHCR
        run: |
          docker push ${{ env.GHCR_IMAGE }}:latest
          docker push ${{ env.GHCR_IMAGE }}:${{ github.sha }}

      - name: Make GHCR package public
        run: |
          PACKAGE_URL="https://api.github.com/repos/${{ github.repository }}/packages/container/engineering-erp"
          curl -s -X PATCH "$PACKAGE_URL" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"visibility":"public"}' || \
          echo "Warning: Could not set package visibility (may already be public)"

      - name: Push clean README.md to HF Space
        run: |
          SPACE="Tablets/engineering-erp"
          cd /tmp
          rm -rf space-clean && mkdir space-clean && cd space-clean
          cat > README.md << 'ENDOFREADME'
---
title: Engineering ERP
emoji: 🏗️
colorFrom: blue
colorTo: indigo
sdk: docker
app_port: 8000
dockerImage: ghcr.io/ahmed-gaffer/engineering-erp:latest
pinned: false
---
ENDOFREADME
          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Deploy $(date -u)"
          git remote add hf "https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/$SPACE"
          git push --force hf HEAD:main

      - name: Verify deployment
        run: |
          echo "Image: ${{ env.GHCR_IMAGE }}:latest"
          echo "App: https://tablets-engineering-erp.hf.space"
          echo "Space: https://huggingface.co/spaces/Tablets/engineering-erp"
