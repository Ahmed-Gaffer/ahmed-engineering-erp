name: Build & Deploy Docker Image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/ahmed-gaffer/ahmed-engineering-erp/engineering-erp

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push Docker image
        run: |
          docker build -t ${{ env.GHCR_IMAGE }}:latest \
                      -t ${{ env.GHCR_IMAGE }}:${{ github.sha }} \
                      .
          docker push ${{ env.GHCR_IMAGE }}:latest
          docker push ${{ env.GHCR_IMAGE }}:${{ github.sha }}

      - name: Verify build
        run: |
          echo "Image pushed to ${{ env.GHCR_IMAGE }}:latest"
          echo "To make clean deploy (no source on HF Space):"
          echo "  1. Create GitHub PAT with write:packages scope"
          echo "  2. Add as GH_PAT secret to this repo"
          echo "  3. Create GH_PAT secret"
          echo "  4. Re-enable the Push-clean step in this workflow"
