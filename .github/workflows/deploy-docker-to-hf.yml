name: Build & Deploy Docker Image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/ahmed-gaffer/ahmed-engineering-erp/engineering-erp
  PACKAGE_NAME: engineering-erp
  GHCR_OWNER: ahmed-gaffer
  GHCR_REPO: ahmed-engineering-erp

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ env.GHCR_IMAGE }}:latest \
                      -t ${{ env.GHCR_IMAGE }}:${{ github.sha }} \
                      .

      - name: Push Docker image to GHCR
        run: |
          docker push ${{ env.GHCR_IMAGE }}:latest
          docker push ${{ env.GHCR_IMAGE }}:${{ github.sha }}

      - name: Make GHCR package public via gh api
        run: |
          echo "Setting package visibility to public via gh api..."
          gh api -X PATCH \
            /repos/${{ github.repository }}/packages/container/${{ env.PACKAGE_NAME }}/visibility \
            -f visibility=public
          echo "Done"

      - name: Push clean README-only config to HF Space
        run: |
          SPACE_PATH="Tablets/engineering-erp"
          AUTH_URL="https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/$SPACE_PATH"
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"

          cat > README.md << 'EOF'
---
title: Engineering ERP
emoji: 🏗️
colorFrom: blue
colorTo: indigo
sdk: docker
app_port: 8000
dockerImage: ghcr.io/ahmed-gaffer/ahmed-engineering-erp/engineering-erp:latest
pinned: false
---

EOF

          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add README.md
          git commit -m "Deploy via GHCR Docker image"
          git push --force "$AUTH_URL" HEAD:main
          echo "HF Space pushed successfully"

      - name: Verify deployment
        run: |
          echo "Image: ${{ env.GHCR_IMAGE }}:latest"
          echo "App: https://tablets-engineering-erp.hf.space"
          echo "Space: https://huggingface.co/spaces/Tablets/engineering-erp"
