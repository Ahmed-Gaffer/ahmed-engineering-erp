name: Build & Deploy Docker Image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Make GHCR package public
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          PACKAGE="${{ env.IMAGE_NAME }}"
          PACKAGE_LOWER=$(echo "$PACKAGE" | tr '[:upper:]' '[:lower:]')
          echo "Making package public: $OWNER_LOWER/$REPO_LOWER -> $PACKAGE_LOWER"
          gh api -X PATCH "/repos/${{ github.repository }}/packages/container/$PACKAGE_LOWER/visibility" \
            --raw-field visibility=public \
            --jq '.visibility' || \
          gh api -X PATCH "/users/$OWNER_LOWER/packages/container/$PACKAGE_LOWER/visibility" \
            --raw-field visibility=public \
            --jq '.visibility' || \
          echo "WARNING: Could not make package public. App may not start on HF Space."

      - name: Push clean config to HF Space
        run: |
          SPACE_PATH="Tablets/engineering-erp"
          AUTH_URL="https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/$SPACE_PATH"
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"

          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="${{ env.REGISTRY }}/$OWNER_LOWER/$REPO_LOWER"

          cat > README.md << EOF
---
title: Engineering ERP
emoji: 🏗️
colorFrom: blue
colorTo: indigo
sdk: docker
app_port: 8000
dockerImage: ${IMAGE_TAG}:latest
pinned: false
---
EOF

          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add README.md
          git commit -m "Deploy via GHCR Docker image"
          git push --force "$AUTH_URL" HEAD:main
          echo "HF Space pushed successfully"

      - name: Verify deployment
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "App: https://tablets-engineering-erp.hf.space"
          echo "Space: https://huggingface.co/spaces/Tablets/engineering-erp"
