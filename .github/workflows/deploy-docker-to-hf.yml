name: Build & Deploy Docker Image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/ahmed-gaffer/ahmed-engineering-erp/engineering-erp

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push Docker image
        run: |
          docker build -t ${{ env.GHCR_IMAGE }}:latest \
                      -t ${{ env.GHCR_IMAGE }}:${{ github.sha }} \
                      .
          docker push ${{ env.GHCR_IMAGE }}:latest
          docker push ${{ env.GHCR_IMAGE }}:${{ github.sha }}

      - name: Set GHCR package visibility (best-effort)
        continue-on-error: true
        run: |
          echo "=== Attempt via gh api (user-scoped) ==="
          gh api -X PATCH /users/ahmed-gaffer/packages/container/engineering-erp/visibility \
            --raw-field visibility=public --jq '.visibility' 2>&1 || \
            echo "gh api user-scoped failed"
          
          echo "=== Attempt via gh api (repo-scoped) ==="
          gh api -X PATCH /repos/Ahmed-Gaffer/ahmed-engineering-erp/packages/container/engineering-erp/visibility \
            --raw-field visibility=public --jq '.visibility' 2>&1 || \
            echo "gh api repo-scoped failed"

      - name: Push clean README to HF Space
        run: |
          SPACE_PATH="Tablets/engineering-erp"
          AUTH_URL="https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/$SPACE_PATH"
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"

          cat > README.md << 'EOF'
---
title: Engineering ERP
emoji: 🏗️
colorFrom: blue
colorTo: indigo
sdk: docker
app_port: 8000
dockerImage: ghcr.io/ahmed-gaffer/ahmed-engineering-erp/engineering-erp:latest
pinned: false
---
EOF

          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add README.md
          git commit -m "Deploy via GHCR Docker image"
          git push --force "$AUTH_URL" HEAD:main
          echo "HF Space pushed successfully"

      - name: Verify deployment
        run: |
          echo "Image: ${{ env.GHCR_IMAGE }}:latest"
          echo "App: https://tablets-engineering-erp.hf.space"
          echo "Space: https://huggingface.co/spaces/Tablets/engineering-erp"
